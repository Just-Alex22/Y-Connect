name: yconnect
description: Y-Connect Desktop — Flutter companion for Y-Connect Android.
publish_to: "none"
version: 2.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  window_manager: ^0.3.7
  qr_flutter: ^4.1.0
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: fonts/NotoSansSC.ttf
    - family: NotoSansKR
      fonts:
        - asset: fonts/NotoSansKR.ttf
    - family: NotoSansJP
      fonts:
        - asset: fonts/NotoSansJP.ttf